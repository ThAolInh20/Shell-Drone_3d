<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Drone Formation Editor</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background-color: #1a1a1a;
        color: #ffffff;
        font-family: 'Inter', sans-serif;
      }
      .editor-panel {
        position: absolute;
        top: 0;
        width: 300px;
        height: 100vh;
        background: rgba(30, 30, 30, 0.9);
        padding: 20px;
        box-sizing: border-box;
        overflow-y: auto;
      }
      #editor-ui-left {
        left: 0;
        border-right: 1px solid #333;
      }
      #editor-ui-right {
        right: 0;
        border-left: 1px solid #333;
      }
      .panel-section {
        margin-bottom: 20px;
        padding-bottom: 20px;
        border-bottom: 1px solid #444;
      }
      .panel-section h3 {
        margin-top: 0;
        font-size: 16px;
        color: #aaa;
        text-transform: uppercase;
      }
      .input-group {
        display: flex;
        justify-content: space-between;
        margin-bottom: 10px;
        align-items: center;
      }
      .input-group label {
        font-size: 14px;
        color: #ccc;
      }
      .input-group input {
        width: 60px;
        background: #222;
        border: 1px solid #555;
        color: #fff;
        padding: 4px;
        border-radius: 4px;
      }
      .btn {
        display: block;
        width: 100%;
        padding: 10px;
        background: #3a86ff;
        color: #fff;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
        margin-bottom: 10px;
        transition: background 0.2s;
      }
      .btn:hover {
        background: #2a76ef;
      }
      .btn-secondary {
        background: #444;
      }
      .btn-secondary:hover {
        background: #555;
      }
      .gizmo-controls {
        display: flex;
        gap: 5px;
      }
      .gizmo-btn {
        flex: 1;
        padding: 8px 0;
        background: #333;
        color: #fff;
        border: 1px solid #555;
        border-radius: 4px;
        cursor: pointer;
      }
      .gizmo-btn.active {
        background: #3a86ff;
        border-color: #3a86ff;
      }
    </style>
  </head>
  <body>
    <div id="editor-ui-left" class="editor-panel"></div>
    <div id="editor-ui-right" class="editor-panel"></div>
    <script type="module" src="/src/editor/main.js"></script>
  </body>
</html>
